# ============================================================
# CI — Lint, type-check e build do RHID Datalake ETL
# Chamado pelo publish.yml via workflow_call
# ============================================================

name: CI

on:
  workflow_call:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install ruff pyright

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (pyright)
        run: pyright
        continue-on-error: true  # warning-only até estabilizar

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rhid-datalake-etl:${{ github.sha }} .

      - name: Verificar imagem
        run: |
          docker run --rm --entrypoint python rhid-datalake-etl:${{ github.sha }} -c "
          import daily, backfill, entities, storage
          print('Módulos do ETL importados com sucesso')
          "
